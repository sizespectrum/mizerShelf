url: https://sizespectrum.org/mizerShelf
template:
  bootstrap: 5
  bootswatch: cerulean

navbar:
  structure:
    left: [home, reference, articles]
    right: [github]
    
home:
  sidebar:
    structure: [links, citation, license, dev]

destination: docs

reference:
- title: Detritus
- contents:
  - matches("etritus")
- title: Carrion
- contents:
  - matches("arrion")
- title: Plots
- contents:
  - matches("plot")
- title: Mortality
- contents:
  - matches("Mort")
- title: Others
- contents:
  - mizerShelf-class
  - encounter_contribution
- title: Extended mizer methods
- contents:
  - getBiomass
  - steady
  - removeSpecies
  - addSpecies
  - scaleModel
- title: Example model
- contents:
  - matches("NWMed")
